<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:       #ffffff;
      --bg-sec:   #f4f3ef;
      --bg-ter:   #eceae4;
      --text:     #1a1a18;
      --text-sec: #5f5e5a;
      --text-ter: #9a9891;
      --border:   rgba(0,0,0,0.12);
      --border-md:rgba(0,0,0,0.22);
      --border-hv:rgba(0,0,0,0.35);
      --radius-md:8px;
      --radius-lg:12px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
 
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #1c1c1a;
        --bg-sec:   #262624;
        --bg-ter:   #2e2e2b;
        --text:     #f0ede6;
        --text-sec: #a09e98;
        --text-ter: #6a6865;
        --border:   rgba(255,255,255,0.10);
        --border-md:rgba(255,255,255,0.20);
        --border-hv:rgba(255,255,255,0.35);
      }
    }
 
    body {
      font-family: var(--font);
      background: var(--bg-ter);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
 
    .app {
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      width: 100%;
      max-width: 900px;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
    }
 
    /* ── Calendar ────────────────────────── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .cal-title { font-size: 18px; font-weight: 500; }
    .nav-btn {
      background: none;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 6px 14px;
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
      display: flex;
      align-items: center;
      transition: background .15s;
    }
    .nav-btn:hover { background: var(--bg-sec); }
 
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day-label {
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-ter);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 4px 0 6px;
    }
    .day-cell {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 5px 6px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    .day-cell.weekend { background: var(--bg-sec); }
    .day-cell:hover { border-color: var(--border-hv); transform: scale(1.04); }
    .day-cell.empty { border-color: transparent; cursor: default; background: none; }
    .day-cell.empty:hover { transform: none; }
    .day-cell.selected { border: 1.5px solid var(--text); }
    .day-cell.today .day-num {
      background: var(--text); color: var(--bg);
      border-radius: 50%; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .day-num { font-size: 12px; font-weight: 500; line-height: 1; z-index: 1; }
    .day-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: auto; z-index: 1; }
    .day-icon { font-size: 11px; line-height: 1; z-index: 1; margin-top: 1px; }
    .day-title-preview {
      font-size: 9px; color: var(--text-sec); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%; z-index: 1; line-height: 1.2;
    }
    .day-bg { position: absolute; inset: 0; opacity: .45; z-index: 0; }
    .day-bg--dim { opacity: .18; }
 
    /* ── Panel ───────────────────────────── */
    .panel {
      border-left: 0.5px solid var(--border);
      padding-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
 
    .panel-section-label {
      font-size: 10px; font-weight: 500; color: var(--text-ter);
      text-transform: uppercase; letter-spacing: .06em;
    }
 
    /* upcoming */
    .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
    .upcoming-item {
      border-radius: var(--radius-md); border: 0.5px solid var(--border);
      padding: 8px 10px; display: grid;
      grid-template-columns: 4px 1fr auto;
      align-items: start; gap: 8px; cursor: pointer;
      transition: border-color .15s, background .15s; background: var(--bg);
    }
    .upcoming-item:hover { border-color: var(--border-hv); background: var(--bg-sec); }
    .upcoming-color { width: 4px; border-radius: 2px; align-self: stretch; min-height: 28px; background: var(--border-md); }
    .upcoming-body { overflow: hidden; }
    .upcoming-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upcoming-meta { font-size: 11px; color: var(--text-sec); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .upcoming-countdown {
      font-size: 11px; font-weight: 500; white-space: nowrap;
      padding: 2px 6px; border-radius: 20px;
      background: var(--bg-sec); color: var(--text-sec); align-self: center;
    }
    .upcoming-countdown.today { background: var(--bg-ter); color: var(--text); }
    .no-upcoming { font-size: 13px; color: var(--text-ter); text-align: center; line-height: 1.7; }
 
    /* legend */
    .legend-divider {
      border: none; border-top: 0.5px solid var(--border); margin: 0;
    }
    .legend-list { display: flex; flex-direction: column; gap: 6px; }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .legend-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-ter); font-size: 14px; line-height: 1;
      padding: 2px 4px; border-radius: 4px; transition: color .15s;
    }
    .legend-del:hover { color: #e24b4a; }
 
    .legend-add { display: flex; flex-direction: column; gap: 6px; }
    .legend-input {
      width: 100%; padding: 6px 10px;
      border-radius: var(--radius-md); border: 0.5px solid var(--border-md);
      font-size: 13px; background: var(--bg); color: var(--text);
      font-family: var(--font);
    }
    .legend-input:focus { outline: none; border-color: var(--border-hv); }
    .legend-swatches { display: flex; flex-wrap: wrap; gap: 5px; }
    .legend-swatch {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .12s, border-color .12s;
    }
    .legend-swatch:hover { transform: scale(1.2); }
    .legend-swatch.active { border-color: var(--text); }
    .legend-add-btn {
      width: 100%; padding: 6px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg-sec);
      color: var(--text); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: var(--font); transition: background .15s;
    }
    .legend-add-btn:hover { background: var(--bg-ter); }
 
    /* editor */
    .panel-date { font-size: 15px; font-weight: 500; color: var(--text); }
    .panel-label {
      font-size: 10px; font-weight: 500; color: var(--text-ter);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px;
    }
    .panel-input {
      width: 100%; padding: 7px 10px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); font-size: 13px;
      background: var(--bg); color: var(--text); font-family: var(--font);
      transition: border-color .15s;
    }
    .panel-input:focus { outline: none; border-color: var(--border-hv); }
    .panel-textarea { resize: none; height: 70px; line-height: 1.5; }
 
    .color-swatches { display: flex; flex-wrap: wrap; gap: 6px; }
    .swatch {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .12s, border-color .12s;
    }
    .swatch:hover { transform: scale(1.18); }
    .swatch.active { border-color: var(--text); }
    .swatch-none {
      background: var(--bg-sec); border: 0.5px solid var(--border-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-ter); font-size: 13px;
    }
 
    .icon-grid { display: flex; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: var(--radius-md);
      border: 1.5px solid transparent; background: var(--bg-sec);
      cursor: pointer; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, border-color .12s, background .12s;
    }
    .icon-btn:hover { transform: scale(1.12); background: var(--bg-ter); }
    .icon-btn.active { border-color: var(--text); background: var(--bg-ter); }
    .icon-none-btn { font-size: 13px; color: var(--text-ter); }
 
    .btn-save {
      width: 100%; padding: 9px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg-sec);
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px; transition: background .15s;
    }
    .btn-save:hover { background: var(--bg-ter); }
    .btn-clear {
      width: 100%; padding: 7px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border); background: none; color: var(--text-ter);
      font-size: 12px; cursor: pointer; font-family: var(--font);
      transition: color .15s, border-color .15s;
    }
    .btn-clear:hover { color: #e24b4a; border-color: #e24b4a; }
    .saved-flash { font-size: 11px; color: #1d9e75; text-align: center; min-height: 14px; }
    .panel-actions { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
 
    @media (max-width: 660px) {
      .app { grid-template-columns: 1fr; }
      .panel { border-left: none; border-top: 0.5px solid var(--border); padding-left: 0; padding-top: 1rem; }
    }
  </style>
</head>
<body>
<main class="app">
  <div class="cal-left">
    <div class="cal-nav">
      <button class="nav-btn" id="prev" aria-label="Previous month">&#8592;</button>
      <span class="cal-title" id="month-label"></span>
      <button class="nav-btn" id="next" aria-label="Next month">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <aside class="panel" id="panel"></aside>
</main>
 
<script>
  const COLORS_SOLID = [
    { hex: '#E24B4A' }, { hex: '#D85A30' }, { hex: '#EF9F27' },
    { hex: '#F5D000' }, { hex: '#639922' }, { hex: '#1D9E75' },
    { hex: '#0AADA8' }, { hex: '#378ADD' }, { hex: '#1A5FA8' },
    { hex: '#7F77DD' }, { hex: '#A855C8' }, { hex: '#D4537E' },
    { hex: '#E8837A' }, { hex: '#C8954A' }, { hex: '#888780' },
    { hex: '#4B5563' }, { hex: '#8B5E3C' }, { hex: '#2D6A4F' },
  ];
  const COLORS_FADED = COLORS_SOLID.map(c => {
    const r = parseInt(c.hex.slice(1,3),16);
    const g = parseInt(c.hex.slice(3,5),16);
    const b = parseInt(c.hex.slice(5,7),16);
    return { hex: `rgba(${r},${g},${b},0.5)` };
  });
  const ALL_COLORS = [...COLORS_SOLID, ...COLORS_FADED];
 
  const ICONS = [
    { emoji: '📋', label: 'Test'  },
    { emoji: '✏️', label: 'To do' },
  ];
 
  const DAYS   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
 
  const STORAGE_KEY        = 'color-calendar-events';
  const LEGEND_STORAGE_KEY = 'color-calendar-legend';
 
  function loadEvents() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }
  function saveEvents(ev) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ev)); } catch {}
  }
  function loadLegend() {
    try { return JSON.parse(localStorage.getItem(LEGEND_STORAGE_KEY)) || []; } catch { return []; }
  }
  function saveLegend(l) {
    try { localStorage.setItem(LEGEND_STORAGE_KEY, JSON.stringify(l)); } catch {}
  }
 
  let state = {
    year:    new Date().getFullYear(),
    month:   new Date().getMonth(),
    selected: null,
    events:  loadEvents(),
    legend:  loadLegend(),
  };
  let pending = { color: '', title: '', desc: '', icon: '' };
  let legendPick = COLORS_SOLID[4].hex; // default blue for new legend entry
 
  function key(y, m, d) { return `${y}-${m}-${d}`; }
 
  // Returns legend color for a title, or '' if none matches
  function legendColorFor(title) {
    if (!title) return '';
    const lower = title.toLowerCase();
    for (const entry of state.legend) {
      if (lower.includes(entry.name.toLowerCase())) return entry.color;
    }
    return '';
  }
 
  /* ── Calendar ─────────────────────────── */
  function render() { renderCalendar(); renderPanel(); }
 
  function renderCalendar() {
    const { year, month, selected, events } = state;
    document.getElementById('month-label').textContent = `${MONTHS[month]} ${year}`;
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
 
    DAYS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'day-label'; el.textContent = d;
      grid.appendChild(el);
    });
 
    const firstWeekday = (new Date(year, month, 1).getDay() + 6) % 7;
    const daysInMonth  = new Date(year, month + 1, 0).getDate();
    const today        = new Date();
 
    for (let i = 0; i < firstWeekday; i++) {
      const el = document.createElement('div');
      el.className = 'day-cell empty'; grid.appendChild(el);
    }
 
    for (let d = 1; d <= daysInMonth; d++) {
      const k  = key(year, month, d);
      const ev = events[k];
      const el = document.createElement('div');
      el.className = 'day-cell';
 
      const dow = new Date(year, month, d).getDay();
      if (dow === 0 || dow === 6) el.classList.add('weekend');
      if (selected && selected.d === d && selected.m === month && selected.y === year)
        el.classList.add('selected');
      if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d)
        el.classList.add('today');
 
      const num = document.createElement('div');
      num.className = 'day-num'; num.textContent = d;
      el.appendChild(num);
 
      if (ev) {
        // Color: manual first, then legend fallback
        const displayColor = ev.color || legendColorFor(ev.title);
        if (displayColor) {
          const bg = document.createElement('div');
          bg.className = 'day-bg' + (ev.icon === '📋' ? '' : ' day-bg--dim');
          bg.style.background = displayColor;
          el.appendChild(bg);
          const dot = document.createElement('div');
          dot.className = 'day-dot'; dot.style.background = displayColor;
          el.appendChild(dot);
        }
        if (ev.icon) {
          const ic = document.createElement('div');
          ic.className = 'day-icon'; ic.textContent = ev.icon;
          el.appendChild(ic);
        }
        if (ev.title) {
          const tp = document.createElement('div');
          tp.className = 'day-title-preview'; tp.textContent = ev.title;
          el.appendChild(tp);
        }
      }
 
      el.addEventListener('click', () => selectDay(d));
      grid.appendChild(el);
    }
  }
 
  function selectDay(d) {
    pending = { ...(state.events[key(state.year, state.month, d)] || { color:'', title:'', desc:'', icon:'' }) };
    state.selected = { y: state.year, m: state.month, d };
    render();
  }
 
  /* ── Upcoming + Legend (idle panel) ─────*/
  function renderUpcoming() {
    const panel = document.getElementById('panel');
    const today = new Date(); today.setHours(0,0,0,0);
 
    const upcoming = Object.entries(state.events)
      .map(([k, ev]) => {
        const [y, m, d] = k.split('-').map(Number);
        return { date: new Date(y, m, d), ev, y, m, d };
      })
      .filter(e => e.date >= today && e.ev.title)
      .sort((a, b) => a.date - b.date)
      .slice(0, 3);
 
    const upcomingHtml = upcoming.length === 0
      ? `<div class="no-upcoming">No upcoming events.<br>Click a day to add one.</div>`
      : upcoming.map(({ date, ev, y, m, d }) => {
          const diff = Math.round((date - today) / 86400000);
          const countdown = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : `${diff}d`;
          const dateStr = date.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
          const dispColor = ev.color || legendColorFor(ev.title);
          const colorBar = dispColor ? `background:${dispColor}` : '';
          const iconHtml = ev.icon ? `<span>${ev.icon}</span>` : '';
          return `
            <div class="upcoming-item" data-y="${y}" data-m="${m}" data-d="${d}">
              <div class="upcoming-color" style="${colorBar}"></div>
              <div class="upcoming-body">
                <div class="upcoming-title">${escHtml(ev.title)}</div>
                <div class="upcoming-meta">${iconHtml}<span>${dateStr}</span></div>
              </div>
              <div class="upcoming-countdown${diff===0?' today':''}">${countdown}</div>
            </div>`;
        }).join('');
 
    // Legend list
    const legendListHtml = state.legend.length === 0
      ? `<div style="font-size:12px;color:var(--text-ter)">No courses yet.</div>`
      : state.legend.map((entry, i) => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${entry.color}"></div>
            <span class="legend-name">${escHtml(entry.name)}</span>
            <button class="legend-del" data-i="${i}" title="Remove">&#215;</button>
          </div>`).join('');
 
    // Legend swatch picker
    const legendSwatchesHtml = COLORS_SOLID.map(c =>
      `<div class="legend-swatch${legendPick===c.hex?' active':''}" data-color="${c.hex}" style="background:${c.hex}" title="${c.hex}"></div>`
    ).join('');
 
    panel.innerHTML = `
      <div class="panel-section-label">Upcoming</div>
      <div class="upcoming-list" id="upcoming-list">${upcomingHtml}</div>
 
      <hr class="legend-divider" />
 
      <div class="panel-section-label">Course Legend</div>
      <div class="legend-list" id="legend-list">${legendListHtml}</div>
 
      <div class="legend-add">
        <input class="legend-input" id="legend-name-input" type="text" placeholder="Course name (e.g. Math)" maxlength="40" />
        <div class="legend-swatches" id="legend-swatches">${legendSwatchesHtml}</div>
        <button class="legend-add-btn" id="legend-add-btn">+ Add course</button>
      </div>
    `;
 
    // Upcoming click
    panel.querySelectorAll('.upcoming-item').forEach(el => {
      el.addEventListener('click', () => {
        state.year = +el.dataset.y; state.month = +el.dataset.m;
        selectDay(+el.dataset.d);
      });
    });
 
    // Legend delete
    panel.querySelectorAll('.legend-del').forEach(btn => {
      btn.addEventListener('click', () => {
        state.legend.splice(+btn.dataset.i, 1);
        saveLegend(state.legend);
        render();
      });
    });
 
    // Legend swatch pick
    panel.querySelectorAll('.legend-swatch').forEach(s => {
      s.addEventListener('click', () => {
        legendPick = s.dataset.color;
        panel.querySelectorAll('.legend-swatch').forEach(x =>
          x.classList.toggle('active', x.dataset.color === legendPick));
      });
    });
 
    // Add course
    document.getElementById('legend-add-btn').addEventListener('click', () => {
      const input = document.getElementById('legend-name-input');
      const name  = input.value.trim();
      if (!name) return;
      // Prevent duplicates
      if (state.legend.some(e => e.name.toLowerCase() === name.toLowerCase())) {
        input.value = ''; return;
      }
      state.legend.push({ name, color: legendPick });
      saveLegend(state.legend);
      input.value = '';
      render();
    });
 
    // Allow Enter key to add
    document.getElementById('legend-name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('legend-add-btn').click();
    });
  }
 
  /* ── Editor panel ────────────────────── */
  function renderPanel() {
    const panel = document.getElementById('panel');
    const { selected, month, year } = state;
 
    if (!selected || selected.m !== month || selected.y !== year) {
      renderUpcoming(); return;
    }
 
    panel.innerHTML = `
      <div class="panel-date">${MONTHS[selected.m]} ${selected.d}, ${selected.y}</div>
 
      <div>
        <div class="panel-label">Color</div>
        <div class="color-swatches" id="swatches"></div>
      </div>
 
      <div>
        <div class="panel-label">Icon</div>
        <div class="icon-grid" id="icon-grid"></div>
      </div>
 
      <div>
        <div class="panel-label">Title</div>
        <input class="panel-input" id="ev-title" type="text" placeholder="Add a title…" value="${escHtml(pending.title||'')}">
      </div>
      <div>
        <div class="panel-label">Description</div>
        <textarea class="panel-input panel-textarea" id="ev-desc" placeholder="Add a note…">${escHtml(pending.desc||'')}</textarea>
      </div>
 
      <div class="saved-flash" id="flash"></div>
      <div class="panel-actions">
        <button class="btn-save" id="btn-save">&#10003; Save</button>
        <button class="btn-clear" id="btn-clear">Clear this day</button>
      </div>
    `;
 
    // Build swatches (solid + faded)
    const wrap = document.getElementById('swatches');
    const noneS = document.createElement('div');
    noneS.className = 'swatch swatch-none' + (!pending.color ? ' active' : '');
    noneS.title = 'No color'; noneS.innerHTML = '&times;';
    noneS.dataset.color = '';
    noneS.addEventListener('click', () => { pending.color = ''; refreshSwatches(); });
    wrap.appendChild(noneS);
 
    ALL_COLORS.forEach(c => {
      const s = document.createElement('div');
      s.className = 'swatch' + (pending.color === c.hex ? ' active' : '');
      s.style.background = c.hex; s.dataset.color = c.hex;
      s.addEventListener('click', () => { pending.color = c.hex; refreshSwatches(); });
      wrap.appendChild(s);
    });
 
    // Build icons
    const grid = document.getElementById('icon-grid');
    const noneIcon = document.createElement('div');
    noneIcon.className = 'icon-btn icon-none-btn' + (!pending.icon ? ' active' : '');
    noneIcon.textContent = '×'; noneIcon.title = 'No icon';
    noneIcon.addEventListener('click', () => { pending.icon = ''; refreshIcons(); });
    grid.appendChild(noneIcon);
 
    ICONS.forEach(ic => {
      const btn = document.createElement('div');
      btn.className = 'icon-btn' + (pending.icon === ic.emoji ? ' active' : '');
      btn.title = ic.label; btn.textContent = ic.emoji;
      btn.addEventListener('click', () => { pending.icon = ic.emoji; refreshIcons(); });
      grid.appendChild(btn);
    });
 
    document.getElementById('ev-title').addEventListener('input', e => { pending.title = e.target.value; });
    document.getElementById('ev-desc').addEventListener('input',  e => { pending.desc  = e.target.value; });
 
    document.getElementById('btn-save').addEventListener('click', () => {
      const k = key(selected.y, selected.m, selected.d);
      const t = (document.getElementById('ev-title').value||'').trim();
      const d = (document.getElementById('ev-desc').value||'').trim();
      if (t || d || pending.color || pending.icon) {
        state.events[k] = { color: pending.color, title: t, desc: d, icon: pending.icon };
      } else {
        delete state.events[k];
      }
      saveEvents(state.events);
      const fl = document.getElementById('flash');
      if (fl) { fl.textContent = 'Saved!'; setTimeout(() => { if (fl) fl.textContent = ''; }, 1500); }
      renderCalendar();
    });
 
    document.getElementById('btn-clear').addEventListener('click', () => {
      delete state.events[key(selected.y, selected.m, selected.d)];
      saveEvents(state.events);
      pending = { color:'', title:'', desc:'', icon:'' };
      state.selected = null;
      render();
    });
  }
 
  function refreshSwatches() {
    document.querySelectorAll('.swatch').forEach(s =>
      s.classList.toggle('active', s.dataset.color === pending.color));
  }
  function refreshIcons() {
    document.querySelectorAll('.icon-btn').forEach(btn =>
      btn.classList.toggle('active', btn.classList.contains('icon-none-btn')
        ? !pending.icon : btn.textContent === pending.icon));
  }
 
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
 
  document.getElementById('prev').addEventListener('click', () => {
    if (--state.month < 0) { state.month = 11; state.year--; }
    state.selected = null; render();
  });
  document.getElementById('next').addEventListener('click', () => {
    if (++state.month > 11) { state.month = 0; state.year++; }
    state.selected = null; render();
  });
 
  render();
</script>
</body>
</html>
